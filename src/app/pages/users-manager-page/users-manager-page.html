<div class="container">
    <h2 class="text-center mt-4 mb-4">Gestion des utilisateurs</h2>
    
    <!-- Bouton pour ajouter un utilisateur (optionnel) -->
    <div class="text-end mb-3">
        <button class="btn btn-primary" (click)="createUser()">
            + Nouvel utilisateur
        </button>
    </div>

    <div class="table-responsive">
        <table class="table table-striped table-bordered align-middle">
            <thead class="table-light">
                 <tr>
                    <th scope="col">ID</th>
                    <th scope="col">Nom d'utilisateur</th>
                    <th scope="col">Email</th>
                    <th scope="col">Rôles</th>
                    <th scope="col" class="text-center">Actions</th>
                 </tr>
            </thead>
            <tbody>
                @for (user of users; track user.id) {
                 <tr>
                    <td>{{ user.id }}</td>
                    <td>{{ user.username }}</td>
                    <td>{{ user.email }}</td>
                    <td>{{ user.roles?.join(', ') || user.role || 'Non défini' }}</td>
                    <td class="text-center">
                        <button class="btn btn-outline-danger btn-sm" (click)="supprimerUtilisateur(user.id)">
                            Supprimer
                        </button>
                    </td>
                 </tr>
                } @empty {
                 <tr>
                    <td colspan="5" class="text-center text-muted">
                        Aucun utilisateur trouvé
                    </td>
                 </tr>
                }
            </tbody>
        </table>
    </div>
</div>
