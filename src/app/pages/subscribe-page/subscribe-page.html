<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-4">
            <div class="card shadow">
                <div class="card-header bg-primary text-white text-center">
                    <h4>Créer un compte SavApp</h4>
                </div>
                <div class="card-body">
                    @if (errorMessage) {
                    <div class="alert alert-danger p-2 small">
                        {{ errorMessage }}
                    </div>
                    }
                    <form (ngSubmit)="onSubmit()">
                        <div class="mb-3">
                            <label class="form-label">Identifiant (Email)</label>
                            <input type="text" name="username" class="form-control" [(ngModel)]="credentials.identifier" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Mot de passe</label>
                            <input type="password" name="password" class="form-control" [(ngModel)]="credentials.password" required>
                        </div>
                        <button type="submit" class="btn btn-primary w-100">
                            S'inscrire
                        </button>
                    </form>
            </div>
        </div>
    </div>
</div>
